<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* --- Phong cách cơ bản cho toàn bộ trang --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe0e9; /* Màu nền nhẹ nhàng bên ngoài */
        }

        /* --- Container chính để giữ thiệp --- */
        .main-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Tạo không gian 3D cho hiệu ứng lật thiệp */
            perspective: 2000px;
        }

        /* --- Cấu trúc lật thiệp --- */
        .card-flipper {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 1s ease-in-out;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* Khi thiệp được lật (class 'open' được thêm bởi JS) */
        .card-flipper.open {
            transform: rotateY(-180deg);
        }

        /* Phong cách chung cho cả 2 mặt thiệp */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Ẩn mặt sau khi lật */
            background-size: cover;
            background-position: center;
            border-radius: 15px; /* Bo góc nhẹ */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* --- MẶT TRƯỚC: Màn hình thổi nến (nền image_0.png) --- */
        .card-front {
            background-image: url('image_0.png');
            z-index: 2;
            transform: rotateY(0deg);
        }

        /* Khu vực chạm (hitbox) trên ngọn nến */
        .candle-hitbox {
            position: absolute;
            /* Định vị chính xác trên ngọn lửa nến trong image_0.png */
            top: 28.5%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; /* Kích thước vừa chạm */
            height: 50px;
            /* background-color: rgba(255,0,0,0.3); /* Mở comment này để thấy vị trí hitbox */
            cursor: pointer;
            z-index: 10;
        }

        /* --- MẶT SAU: Nội dung thiệp mở (nền image_1.png) --- */
        .card-back {
            background-image: url('image_1.png');
            transform: rotateY(180deg);
            background-color: #fffaf0; /* Nền kem sạch */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        /* --- HIỆU ỨNG THỔI NẾN --- */

        /* Hiệu ứng khói (image_2.png) */
        .smoke-puff {
            position: absolute;
            top: 26%; /* Ngay trên ngọn nến */
            left: 50%;
            transform: translateX(-50%) scale(0);
            width: 40px;
            height: 40px;
            background-image: url('image_2.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0;
            z-index: 9;
            transition: transform 0.5s ease-out, opacity 0.5s ease-out;
        }

        /* Khi khói hiện ra (thêm class 'puffing' bởi JS) */
        .smoke-puff.puffing {
            transform: translateX(-50%) scale(1.2);
            opacity: 1;
        }

        /* Class để làm mờ nến gốc (sử dụng hiệu ứng mờ nhẹ để mô phỏng nến tắt) */
        .candle-faded {
            filter: blur(1.5px) opacity(0.7);
            transition: filter 0.5s ease;
        }
        
        /* Phong cách cho văn bản lời chúc bên trong */
        .wishes-text {
            font-size: 1.5rem;
            color: #d14170; /* Màu hồng đậm */
            margin-top: 10px;
            line-height: 1.6;
        }

    </style>
</head>
<body>

    <div class="main-container">
        <div class="card-flipper" id="cardFlipper">
            
            <div class="card-front" id="cardFront">
                <div class="candle-hitbox" onclick="blowCandle()"></div>
                <div class="smoke-puff" id="smokePuff"></div>
            </div>

            <div class="card-back">
                </div>

        </div>
    </div>

    <script>
        // Hàm xử lý sự kiện thổi nến
        function blowCandle() {
            const flipper = document.getElementById('cardFlipper');
            const smoke = document.getElementById('smokePuff');
            const frontCard = document.getElementById('cardFront');

            // 1. Kích hoạt hiệu ứng khói và làm mờ nến
            smoke.classList.add('puffing');
            frontCard.classList.add('candle-faded'); // Thêm class làm mờ nến gốc

            // 2. Kích hoạt pháo giấy nhẹ nhàng
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });

            // 3. Đợi một chút rồi lật thiệp
            setTimeout(() => {
                flipper.classList.add('open');
                
                // (Tùy chọn) Ẩn khói sau khi lật để sạch sẽ
                setTimeout(() => {
                    smoke.classList.remove('puffing');
                }, 500);

            }, 800); // 0.8 giây
        }
    </script>

</body>
</html>
